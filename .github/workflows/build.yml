name: Windows build (MinGW + Vulkan SDK)

on:
  push:
    branches: [main, VCK]
  pull_request:
    branches: [main, VCK]
  workflow_dispatch:

# Cancel stale runs when a branch gets a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build.bat [A]  (all 9 examples)
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Install the Vulkan SDK (provides vulkan-1.lib + glslangValidator). ─
      # Pin a known-good version; the action exports VULKAN_SDK and adds the
      # SDK's Bin to PATH so glslangValidator resolves.
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          optional_components: com.lunarg.vulkan.vma
          install_runtime: true
          cache: false
          stripdown: false

      # ─── Ensure vk_video/*.h headers are present. ──────────────────────────
      # jakoch/install-vulkan-sdk-action@v1 ships the Windows SDK installer
      # with the 'vulkan_video' component deselected (the official LunarG
      # installer treats it as optional).  vulkan_core.h on 1.3.290 however
      # hard-includes "vk_video/vulkan_video_codec_av1std_encode.h" etc, so
      # every TU that pulls <vulkan/vulkan.h> fails with "No such file".
      # We restore the missing directory from the official KhronosGroup
      # Vulkan-Headers tag that matches our SDK version.
      - name: Ensure vk_video headers are present
        shell: pwsh
        run: |
          $dst = Join-Path $env:VULKAN_SDK 'Include\vk_video'
          $needed = @(
            'vulkan_video_codec_av1std.h',
            'vulkan_video_codec_av1std_decode.h',
            'vulkan_video_codec_av1std_encode.h',
            'vulkan_video_codec_h264std.h',
            'vulkan_video_codec_h264std_decode.h',
            'vulkan_video_codec_h264std_encode.h',
            'vulkan_video_codec_h265std.h',
            'vulkan_video_codec_h265std_decode.h',
            'vulkan_video_codec_h265std_encode.h',
            'vulkan_video_codecs_common.h'
          )
          $missing = @()
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          foreach ($f in $needed) {
            if (-not (Test-Path (Join-Path $dst $f))) { $missing += $f }
          }
          if ($missing.Count -eq 0) {
            "vk_video headers already present under $dst" | Write-Host
          } else {
            # KhronosGroup/Vulkan-Headers tags <= 1.3.296 don't contain
            # av1std_encode.h yet (it was added after 1.3.x was branched).
            # The LunarG SDK 1.3.290 *does* ship a vulkan_core.h that hard-
            # includes it, so the bundle is self-consistent only when the
            # action installs the vulkan_video component too.  When we have
            # to fetch the headers manually we use a 1.4.x tag - the files
            # are additive, forward-compatible and safe to drop in under a
            # 1.3.290 SDK.
            $tag = 'vulkan-sdk-1.4.321.0'
            $base = "https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/$tag/include/vk_video"
            foreach ($f in $missing) {
              $url = "$base/$f"
              $out = Join-Path $dst $f
              "fetch $url" | Write-Host
              Invoke-WebRequest $url -OutFile $out
            }
          }
          Get-ChildItem $dst | Format-Table -AutoSize

      # ─── MinGW-w64 GCC.  windows-latest ships MSYS2; we only need mingw-w64
      # on PATH.  Prepending the MSYS2 mingw64 bin directory is enough - we
      # invoke the raw g++.exe, no shell.
      - name: Add MinGW-w64 GCC to PATH
        run: |
          echo C:\msys64\mingw64\bin>>%GITHUB_PATH%

      - name: Verify toolchain
        run: |
          where g++
          where glslangValidator
          g++ --version
          glslangValidator --version

      # ─── Dependencies expected by example/build.bat ─────────────────────────
      #   deps/vk_mem_alloc.h                       (VMA header-only)
      #   deps/libglfw3.a                           (GLFW 3.4 mingw archive)
      #   deps/glfw/include/GLFW/glfw3.h            (GLFW public header)
      #   deps/glfw/include/GLFW/glfw3native.h      (GLFW native header)
      - name: Fetch VMA header
        shell: pwsh
        run: |
          $dst = 'example\deps\vk_mem_alloc.h'
          New-Item -ItemType Directory -Force -Path 'example\deps' | Out-Null
          # VMA ships with the Vulkan SDK under Include\vma\vk_mem_alloc.h; prefer
          # that copy so CI does not depend on raw.githubusercontent being reachable.
          $sdk = $env:VULKAN_SDK
          if ($sdk -and (Test-Path "$sdk\Include\vma\vk_mem_alloc.h")) {
            Copy-Item "$sdk\Include\vma\vk_mem_alloc.h" $dst
            "VMA copied from SDK: $sdk\Include\vma\vk_mem_alloc.h" | Write-Host
          } else {
            Invoke-WebRequest 'https://raw.githubusercontent.com/GPUOpen-LibrariesAndSamples/VulkanMemoryAllocator/master/include/vk_mem_alloc.h' -OutFile $dst
            "VMA fetched from GitHub" | Write-Host
          }
          (Get-Item $dst).Length

      - name: Fetch GLFW (Windows mingw-w64 pre-built)
        shell: pwsh
        run: |
          $ver = '3.4'
          $zip = "glfw-$ver.bin.WIN64.zip"
          $url = "https://github.com/glfw/glfw/releases/download/$ver/$zip"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath .
          New-Item -ItemType Directory -Force -Path 'example\deps\glfw\include\GLFW' | Out-Null
          Copy-Item "glfw-$ver.bin.WIN64\include\GLFW\glfw3.h"       'example\deps\glfw\include\GLFW\glfw3.h'
          Copy-Item "glfw-$ver.bin.WIN64\include\GLFW\glfw3native.h" 'example\deps\glfw\include\GLFW\glfw3native.h'
          Copy-Item "glfw-$ver.bin.WIN64\lib-mingw-w64\libglfw3.a"   'example\deps\libglfw3.a'
          Get-ChildItem example\deps -Recurse

      # ─── Run the same build.bat the user runs locally.  Pipe "A" into the
      # interactive menu so it picks "Build all".
      - name: Build all examples
        working-directory: example
        run: |
          echo A| build.bat
