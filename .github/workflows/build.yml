name: Build (Windows + Linux + macOS)

on:
  push:
    branches: [main, base, VCK]
  pull_request:
    branches: [main, base, VCK]
  workflow_dispatch:

# Cancel stale runs when a branch gets a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  #  Windows (MinGW + LunarG SDK).
  #  This is the canonical platform for the project; the build.bat menu the
  #  user runs locally is exactly what CI runs here, with "A" piped into the
  #  prompt.
  # ---------------------------------------------------------------------------
  windows:
    name: build.bat [A]  (Windows / MinGW)
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Install the Vulkan SDK (provides vulkan-1.lib + glslangValidator).
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          optional_components: com.lunarg.vulkan.vma
          install_runtime: true
          cache: false
          stripdown: false

      # --- Restore the full vk_video/*.h directory.
      # jakoch/install-vulkan-sdk-action@v1 runs the Windows SDK installer
      # with the 'vulkan_video' component deselected (it's optional in the
      # official LunarG installer).  At the same time, the SDK's bundled
      # vulkan_core.h hard-includes roughly a dozen vk_video/*.h files -
      # av1std_encode.h, vp9std.h, and more may be added as the SDK tracks
      # newer Khronos revisions.  Enumerating the known file list drifts.
      #
      # We mirror the entire vk_video/ directory from the Khronos
      # Vulkan-Headers repo at a recent 1.4.x SDK tag (the video-codec
      # headers are additive and forward-compatible).  `git sparse-checkout`
      # pulls just that one directory so the download is small (~50 KB).
      - name: Restore vk_video/*.h headers
        shell: pwsh
        run: |
          $dst    = Join-Path $env:VULKAN_SDK 'Include\vk_video'
          $tag    = 'vulkan-sdk-1.4.321.0'
          $tmp    = Join-Path $env:RUNNER_TEMP 'Vulkan-Headers'

          if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
          git clone --depth 1 --filter=blob:none --sparse `
            --branch $tag https://github.com/KhronosGroup/Vulkan-Headers.git $tmp
          git -C $tmp sparse-checkout set include/vk_video

          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item (Join-Path $tmp 'include\vk_video\*') $dst -Force

          Get-ChildItem $dst | Format-Table Name, Length -AutoSize

      # --- MinGW-w64 GCC.  windows-latest ships MSYS2; we only need mingw-w64
      # on PATH.  Prepending the MSYS2 mingw64 bin directory is enough - we
      # invoke the raw g++.exe, no shell.
      - name: Add MinGW-w64 GCC to PATH
        run: |
          echo C:\msys64\mingw64\bin>>%GITHUB_PATH%

      - name: Verify toolchain
        run: |
          where g++
          where glslangValidator
          g++ --version
          glslangValidator --version

      # --- Dependencies expected by example/build.bat
      #   deps/vk_mem_alloc.h                       (VMA header-only)
      #   deps/libglfw3.a                           (GLFW 3.4 mingw archive)
      #   deps/glfw/include/GLFW/glfw3.h            (GLFW public header)
      #   deps/glfw/include/GLFW/glfw3native.h      (GLFW native header)
      - name: Fetch VMA header
        shell: pwsh
        run: |
          $dst = 'example\deps\vk_mem_alloc.h'
          New-Item -ItemType Directory -Force -Path 'example\deps' | Out-Null
          # VMA ships with the Vulkan SDK under Include\vma\vk_mem_alloc.h; prefer
          # that copy so CI does not depend on raw.githubusercontent being reachable.
          $sdk = $env:VULKAN_SDK
          if ($sdk -and (Test-Path "$sdk\Include\vma\vk_mem_alloc.h")) {
            Copy-Item "$sdk\Include\vma\vk_mem_alloc.h" $dst
            "VMA copied from SDK: $sdk\Include\vma\vk_mem_alloc.h" | Write-Host
          } else {
            Invoke-WebRequest 'https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/master/include/vk_mem_alloc.h' -OutFile $dst
            "VMA fetched from GitHub" | Write-Host
          }
          (Get-Item $dst).Length

      - name: Fetch GLFW (Windows mingw-w64 pre-built)
        shell: pwsh
        run: |
          $ver = '3.4'
          $zip = "glfw-$ver.bin.WIN64.zip"
          $url = "https://github.com/glfw/glfw/releases/download/$ver/$zip"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath .
          New-Item -ItemType Directory -Force -Path 'example\deps\glfw\include\GLFW' | Out-Null
          Copy-Item "glfw-$ver.bin.WIN64\include\GLFW\glfw3.h"       'example\deps\glfw\include\GLFW\glfw3.h'
          Copy-Item "glfw-$ver.bin.WIN64\include\GLFW\glfw3native.h" 'example\deps\glfw\include\GLFW\glfw3native.h'
          Copy-Item "glfw-$ver.bin.WIN64\lib-mingw-w64\libglfw3.a"   'example\deps\libglfw3.a'
          Get-ChildItem example\deps -Recurse

      # --- Run the same build.bat the user runs locally.  Pipe "A" into the
      # interactive menu so it picks "Build all".
      - name: Build all examples
        working-directory: example
        run: |
          echo A| build.bat --toolchain=gcc

      # --- R14 unit-test harness (PR #7).  Builds tests/*.cpp against the
      # libvck.a archive that build.bat just produced, then runs the binary.
      # Failed assertions exit non-zero -> CI red.
      - name: Build + run R14 tests
        working-directory: example
        run: |
          echo T| build.bat --toolchain=gcc
          ..\tests\vck_tests.exe

  # ---------------------------------------------------------------------------
  #  Windows (MSVC cl + LunarG SDK).
  #  Same lib-once compile model as the MinGW job, but using cl /MP (parallel
  #  TU compile in one cl invocation).  Validates the --toolchain=cl path
  #  end-to-end including vswhere auto-detect (microsoft/setup-msbuild puts
  #  vswhere on PATH; ilammy/msvc-dev-cmd preloads vcvars64 so cl resolves
  #  immediately and our vswhere fallback is exercised on a fresh shell only
  #  if you remove the msvc-dev-cmd action).
  # ---------------------------------------------------------------------------
  windows-msvc:
    name: build.bat --toolchain=cl [A]  (Windows / MSVC)
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC env (cl, lib, link on PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          optional_components: com.lunarg.vulkan.vma
          install_runtime: true
          cache: false
          stripdown: false

      - name: Restore vk_video/*.h headers
        shell: pwsh
        run: |
          $dst    = Join-Path $env:VULKAN_SDK 'Include\vk_video'
          $tag    = 'vulkan-sdk-1.4.321.0'
          $tmp    = Join-Path $env:RUNNER_TEMP 'Vulkan-Headers'

          if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
          git clone --depth 1 --filter=blob:none --sparse `
            --branch $tag https://github.com/KhronosGroup/Vulkan-Headers.git $tmp
          git -C $tmp sparse-checkout set include/vk_video

          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item (Join-Path $tmp 'include\vk_video\*') $dst -Force

      - name: Verify toolchain
        run: |
          where cl
          where lib
          where link
          where glslangValidator
          cl 2>&1 | findstr /R /C:"Microsoft.*Compiler"
          glslangValidator --version

      # VMA header (same as MinGW job).
      - name: Fetch VMA header
        shell: pwsh
        run: |
          $dst = 'example\deps\vk_mem_alloc.h'
          New-Item -ItemType Directory -Force -Path 'example\deps' | Out-Null
          $sdk = $env:VULKAN_SDK
          if ($sdk -and (Test-Path "$sdk\Include\vma\vk_mem_alloc.h")) {
            Copy-Item "$sdk\Include\vma\vk_mem_alloc.h" $dst
          } else {
            Invoke-WebRequest 'https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/master/include/vk_mem_alloc.h' -OutFile $dst
          }

      # GLFW pre-compiled binaries shipped two flavours: lib-mingw-w64\libglfw3.a
      # (used by the MinGW job above) AND lib-vc2022\glfw3.lib (used here).  Stage
      # the MSVC archive at example\deps\glfw3.lib so build.bat --toolchain=cl
      # finds it via -LIBPATH:deps.
      - name: Fetch GLFW (Windows MSVC pre-built)
        shell: pwsh
        run: |
          $ver = '3.4'
          $zip = "glfw-$ver.bin.WIN64.zip"
          $url = "https://github.com/glfw/glfw/releases/download/$ver/$zip"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath .
          New-Item -ItemType Directory -Force -Path 'example\deps\glfw\include\GLFW' | Out-Null
          Copy-Item "glfw-$ver.bin.WIN64\include\GLFW\glfw3.h"       'example\deps\glfw\include\GLFW\glfw3.h'
          Copy-Item "glfw-$ver.bin.WIN64\include\GLFW\glfw3native.h" 'example\deps\glfw\include\GLFW\glfw3native.h'
          Copy-Item "glfw-$ver.bin.WIN64\lib-vc2022\glfw3.lib"       'example\deps\glfw3.lib'
          Get-ChildItem example\deps -Recurse

      - name: Build all examples (cl /MP)
        working-directory: example
        run: |
          echo A| build.bat --toolchain=cl

      - name: Build + run R14 tests (cl)
        working-directory: example
        run: |
          echo T| build.bat --toolchain=cl
          ..\tests\vck_tests.exe

  # ---------------------------------------------------------------------------
  #  Linux (Ubuntu + apt Vulkan SDK + GLFW).
  #  Mirrors example/build.sh A.  Distro packages provide a complete vk_video/
  #  header set, so no sparse-checkout patch is needed.
  # ---------------------------------------------------------------------------
  linux:
    name: build.sh A (Linux / Ubuntu / g++)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan + GLFW + glslang + pkg-config
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libvulkan-dev libglfw3-dev vulkan-tools glslang-tools \
            pkg-config g++

      # --- Restore vk_video/*.h into the vendored Vulkan-Headers tree.
      # The repo vendors vendor/vulkan_headers/vulkan/ but ships it without
      # vk_video/, while vulkan_core.h hard-includes a dozen vk_video/*.h
      # files.  On Windows the SDK installer / SDK-bundled headers cover this;
      # on Linux/macOS we sparse-checkout the directory from KhronosGroup at
      # a known-good SDK tag and drop it next to the vendored core headers.
      - name: Restore vk_video/*.h headers (vendored)
        run: |
          set -e
          dst="$GITHUB_WORKSPACE/vendor/vulkan_headers/vulkan/vk_video"
          tag="vulkan-sdk-1.4.321.0"
          tmp="$RUNNER_TEMP/Vulkan-Headers"
          rm -rf "$tmp"
          git clone --depth 1 --filter=blob:none --sparse \
            --branch "$tag" https://github.com/KhronosGroup/Vulkan-Headers.git "$tmp"
          git -C "$tmp" sparse-checkout set include/vk_video
          mkdir -p "$dst"
          cp -v "$tmp"/include/vk_video/* "$dst"/
          ls -la "$dst"

      - name: Verify toolchain
        run: |
          which g++
          which glslangValidator
          g++ --version
          glslangValidator --version
          pkg-config --modversion vulkan
          pkg-config --modversion glfw3

      # --- VMA header is fetched the same way build.sh expects.
      - name: Fetch VMA header
        run: |
          mkdir -p example/deps
          curl -fsSL \
            https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/master/include/vk_mem_alloc.h \
            -o example/deps/vk_mem_alloc.h
          ls -l example/deps/vk_mem_alloc.h

      - name: Make build.sh executable
        run: chmod +x example/build.sh

      - name: Build all examples
        working-directory: example
        run: |
          ./build.sh A

      - name: Build + run R14 tests
        working-directory: example
        run: |
          ./build.sh T
          ../tests/vck_tests

  # ---------------------------------------------------------------------------
  #  macOS (Homebrew Vulkan headers + loader + GLFW + MoltenVK + glslang).
  #  Mirrors example/build.sh A.  MoltenVK provides Vulkan-over-Metal at link
  #  time; runtime ICD selection is not needed for compile-only CI.
  # ---------------------------------------------------------------------------
  macos:
    name: build.sh A (macOS / clang++ + MoltenVK)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan + GLFW + glslang + MoltenVK + pkg-config
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install -q vulkan-headers vulkan-loader glfw glslang molten-vk pkg-config

      # --- Restore vk_video/*.h (same reason as the Linux job).  On macOS
      # the brew vulkan-headers package does ship vk_video, but build.sh adds
      # `-I../vendor/vulkan_headers` which makes the vendored copy win the
      # include search; mirror the headers into vendor/ to match.
      - name: Restore vk_video/*.h headers (vendored)
        run: |
          set -e
          dst="$GITHUB_WORKSPACE/vendor/vulkan_headers/vulkan/vk_video"
          tag="vulkan-sdk-1.4.321.0"
          tmp="$RUNNER_TEMP/Vulkan-Headers"
          rm -rf "$tmp"
          git clone --depth 1 --filter=blob:none --sparse \
            --branch "$tag" https://github.com/KhronosGroup/Vulkan-Headers.git "$tmp"
          git -C "$tmp" sparse-checkout set include/vk_video
          mkdir -p "$dst"
          cp -v "$tmp"/include/vk_video/* "$dst"/
          ls -la "$dst"

      - name: Export Vulkan SDK env
        run: |
          # Homebrew installs Vulkan headers + loader under HOMEBREW_PREFIX.
          # Export PKG_CONFIG_PATH so pkg-config can find the .pc files build.sh queries.
          PFX="$(brew --prefix)"
          {
            echo "PKG_CONFIG_PATH=$PFX/opt/vulkan-headers/share/pkgconfig:$PFX/opt/vulkan-loader/lib/pkgconfig:$PFX/opt/glfw/lib/pkgconfig:$PFX/opt/glslang/lib/pkgconfig:$PFX/lib/pkgconfig"
            echo "VK_ICD_FILENAMES=$(brew --prefix molten-vk)/share/vulkan/icd.d/MoltenVK_icd.json"
          } >> "$GITHUB_ENV"

      - name: Verify toolchain
        run: |
          which clang++
          which glslangValidator || which glslang || true
          clang++ --version
          pkg-config --modversion vulkan || pkg-config --modversion vulkan-headers
          pkg-config --modversion glfw3

      - name: Fetch VMA header
        run: |
          mkdir -p example/deps
          curl -fsSL \
            https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/master/include/vk_mem_alloc.h \
            -o example/deps/vk_mem_alloc.h
          ls -l example/deps/vk_mem_alloc.h

      - name: Make build.sh executable
        run: chmod +x example/build.sh

      - name: Build all examples
        working-directory: example
        env:
          CXX: clang++
        run: |
          ./build.sh A

      - name: Build + run R14 tests
        working-directory: example
        env:
          CXX: clang++
        run: |
          ./build.sh T
          ../tests/vck_tests
